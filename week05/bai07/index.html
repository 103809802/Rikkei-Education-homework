<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="pricing">
  <div class="container">

    <div class="card">
      <h4>Cơ bản</h4>
      <h2>Miễn phí</h2>
      <p>1 Dự án</p>
      <p>100MB Lưu trữ</p>
      <p>Hỗ trợ Email</p>
      <button>Bắt đầu ngay</button>
    </div>

    <div class="card active">
      <h4>Chuyên nghiệp</h4>
      <h2>99.000đ/th</h2>
      <p>Dự án Không Giới Hạn</p>
      <p>10GB Lưu trữ</p>
      <p>Hỗ trợ 24/7</p>
      <p>Domain Tùy chỉnh</p>
      <button>Nâng cấp</button>
    </div>

    <div class="card">
      <h4>Doanh nghiệp</h4>
      <h2>Liên hệ</h2>
      <p>Giải pháp đầy đủ</p>
      <p>Dung lượng cao nhất</p>
      <p>Tư vấn riêng biệt</p>
      <button>Tìm hiểu thêm</button>
    </div>

  </div>
</section>
</body>
</html>
