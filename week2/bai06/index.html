<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hồ sơ thông tin cá nhân</h1>
    <fieldset>
    <legend>Thông tin cá nhân</legend>
    <label for = "name">Tên: </label>
    <input type = "text" id = "name" name = "name" placeholder = "Nhập họ và tên..."><br><br>
    <label for = "bdate">Ngày sinh: </label>
    <input type ="date" id = "bdate" name="bdate">
    </fieldset>

    <fieldset>
    <legend>Thông tin liên hệ </legend>
    <label for = "email">Email:</label>>
    <input type = "email" id ="email" name = "email" placeholder = "example@email.com"><br><br>
    <label for = "phone">Số điện thoại:</label>
    <input type = "tel" id = "phone" name = "phone" placeholder = "0912345678">
    </fieldset><br>

    <p>Ghi chú bổ sung:</p>
    <textarea name ="notes" id = "notes" cols="50" rows="5" placeholder="Nhập ghi chú của bạn tại đây..."></textarea><br><br>
    <button type="submit">Lưu hồ sơ</button>
</body>
</html>
