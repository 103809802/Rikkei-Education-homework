<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>
    <h1>Đăng Ký Đặt Vé Sự Kiện Âm Nhạc</h1>
    <label for="fname">Họ và tên:</label>
    <input type="text" id="fname" name="fname" placeholder="Nhập họ và tên..."><br><br>
    <label for = "tickets">Số lượng vé:</label>
    <input type="number" id = "tickets" name = "tickets" min="1" max="10"><br><br>
    <label for="vip">Mã vé VIP (Đã cấp sẵn)</label>
    <input type="text" id="vip" name="vip" placeholder="MUSIC-VIP-2026" readonly><br><br>
    <label for="coupon">Mã giảm giá nội bộ:</label>
    <input type="text" id="coupon" name="coupon" placeholder="NOT-ELIGIBLE" disabled><br><br>
    <button type="submit">Xác nhận đặt vé</button>
</body>
</html>
