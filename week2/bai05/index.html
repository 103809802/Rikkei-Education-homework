<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Khảo sát dịch vụ khách hàng</h1>
    <label for = "age">Độ tuổi của bạn:</label>
    <input id = "age" type="number" min="0">
    <fieldset>
    <legend>Giới tính của bạn: </legend>
    <input type = "radio" id = "male" name = "gender" value = "male">
    <label for = "male">Nam</label>
    <input type = "radio" id = "female" name= "gender" value = "female">
    <label for = "female">Nữ</label>
    <input type = "radio" id = "other" name = "gender" value = "other">
    <label for = "other">Khác</label>
    </fieldset><br>

    <fieldset>
    <legend>Dịch vụ bạn đang quan tâm (có thể chọn nhiều): </legend>
    <input type = "checkbox" id = "service1" name = "service" value = "service1">
    <label for = "service1">Website</label>
    <input type = "checkbox" id = "service2" name = "service" value = "service2">
    <label for = "service2">Mobile App</label>
    <input type = "checkbox" id = "service3" name = "service" value = "service3">
    <label for = "service3">Marketing</label>
    </fieldset><br>
    
    <label for = "countries">Quốc gia đang sinh sống:</label>
    <select name = "countries" id = "countries">
        <option value ="pick" selected>--Chọn quốc gia--</option>
        <option value ="vietnam">Việt Nam</option>
        <option value ="usa">Hoa Kỳ</option>
        <option value ="japan">Nhật Bản</option>
    </select>
</body>
</html>
